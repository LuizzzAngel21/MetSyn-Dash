name: metsyn-backend
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pandas>=2.0
  - openpyxl
  - great-expectations
  - pandera
  - pydantic>=2.0
  - pydantic-settings   # carga/validación de credenciales desde .env (backend/config.py)
  - scikit-learn   # imputación KNN (etapa impute del ETL)
  - fastapi>=0.110
  - uvicorn
  - python-dotenv
  - dvc
  - dvc-gdrive   # remoto de DVC en Google Drive (dvc push/pull del equipo)
  - pytest
  - ruff
  - pip
  - pip:
      - supabase
      - redis
