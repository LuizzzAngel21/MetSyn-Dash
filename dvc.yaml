# Pipeline reproducible MetSyn — Sprint 1 (ETL Excel → features).
# `dvc repro` regenera data/featured/* desde el crudo versionado por DVC.
# La etapa `train` se añade en Sprint 5 (ver bloque comentado al final).
stages:
  validate:
    cmd: python -m ml.validate
    deps:
      - data/raw
      - ml/validate.py
      - ml/expectations.py
      - ml/clean.py
      - ml/common.py
    outs:
      - validations

  anonymize:
    cmd: python -m ml.anonymize
    deps:
      - data/raw
      - ml/anonymize.py
      - ml/common.py
    outs:
      - data/anon

  clean:
    cmd: python -m ml.clean
    deps:
      - data/anon
      - ml/clean.py
      - ml/common.py
    outs:
      - data/clean

  impute:
    cmd: python -m ml.impute
    deps:
      - data/clean
      - ml/impute.py
      - ml/common.py
    outs:
      - data/imputed

  features:
    cmd: python -m ml.features
    deps:
      - data/imputed
      - ml/features.py
      - ml/contracts.py
      - ml/common.py
      - backend/domain/atp3.py
    outs:
      - data/featured

